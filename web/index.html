<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satoshi Valley — Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #0a0a0a; 
  display: flex; 
  flex-direction: column;
  align-items: center; 
  justify-content: center; 
  height: 100vh; 
  font-family: 'Courier New', monospace;
  color: #F7931A;
  overflow: hidden;
}
canvas { 
  border: 2px solid #F7931A; 
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#info {
  margin-top: 12px;
  font-size: 12px;
  color: #888;
  text-align: center;
}
#title {
  margin-bottom: 12px;
  font-size: 18px;
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div id="title">⛏️ SATOSHI VALLEY — PROTOTYPE</div>
<canvas id="game" width="640" height="480"></canvas>
<div id="info">WASD/Arrows: Move | R: Place Rig (500 sats) | E: Toggle Rig Power | Space: Speed Up Time</div>
<script src="game.js"></script>
</body>
</html>
